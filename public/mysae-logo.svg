<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 185" width="580" height="185">

  <!--
    MySAE logo SVG recreation
    Colours:  Green  #5BBD2F  |  Navy  #1D2468
    "My"  — italic script-style, green, overlapping upper-left of S
    "SAE" — heavy bold sans-serif, navy
  -->

  <!-- SAE — heavy bold, navy, anchored at left with offset to accommodate My -->
  <text
    x="118"
    y="162"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="168"
    font-weight="900"
    fill="#1D2468"
    letter-spacing="-2"
  >SAE</text>

  <!-- My — italic cursive-style, green, sits upper-left overlapping S -->
  <text
    x="8"
    y="128"
    font-family="'Brush Script MT', 'Segoe Script', 'Comic Sans MS', cursive"
    font-size="108"
    font-weight="700"
    font-style="italic"
    fill="#5BBD2F"
  >My</text>

</svg>
